<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Music Tactical</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>HEART MUSIC TACTICAL</h1>

<button id="connect">CONNECTER POLAR H10</button>

<div class="card">
    <div class="label">BPM</div>
    <div id="bpm" class="bpm">--</div>
</div>

<div class="card">
    <div class="label">ZONE</div>
    <div id="zone" class="zone">--</div>
</div>

<div class="card">
    <div class="label">MORCEAU EN COURS</div>
    <div id="currentTrack">Aucun</div>
</div>

<div class="buttons">
    <button id="testChill">TEST CHILL</button>
    <button id="testNormal">TEST NORMAL</button>
    <button id="testEndurance">TEST ENDURANCE</button>
</div>

<div class="buttons">
    <button id="nextTrack">MORCEAU SUIVANT</button>
</div>

<audio id="audio"></audio>

</div>

<script src="app.js"></script>
</body>
</html>
